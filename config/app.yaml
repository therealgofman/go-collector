app:
  name: "Switch Data Collector"
  version: "0.0.1"

  # Параллельный SNMP (internal/main.go, internal/poll)
  snmp:
    # GETBULK max-repetitions (поле PDU при BulkWalk; gosnmp по умолчанию 50; 10 ≈ snmpbulkwalk -Cr10).
    getbulk_max_repetitions: 10
    poll_concurrency: 20
    # Таймаут одного batch SNMP-опроса (сек). По истечении batch прерывается по context.
    # 0 и меньше — подставится 300 секунд.
    poll_batch_timeout_s: 300
    # Интервал (сек) вывода «heartbeat» в консоль при длительном опросе (0 и меньше — подставится 30)
    progress_interval_s: 5
    timeout_default_s: 5
    timeout_mac_s: 15
    retries: 3

# Сопоставление устройства с моделью коллектора (internal/snmp/models/factory.go).
#
# id — ключ, по которому в фабрике выбирается тип модели (миксины задаются в коде класса/структуры).
#
# В каждой строке используйте ОДИН способ идентификации (предпочтительно точный OID):
#   - match_sysobjectid — один полный sysObjectID.0; сравнение только точное
#     (канонизация OID как в internal/snmp/client.go).
#   - match_sysdescr — регулярное выражение по sysDescr.0 (по умолчанию ignorecase + DOTALL на всю строку).
#     Пример: "(?i)S63[0-9]{2}"
# Можно задать оба поля: правило сработает, если совпало ЛЮБОЕ из них (логическое ИЛИ).
# Нужен хотя бы один из двух ключей. Каждый id — ровно одна запись в списке (дубликаты id запрещены).
# Несколько OID на один класс — используйте несколько правил с одинаковым id или одно регулярное выражение в match_sysdescr.
# Проверка: snmpget … 1.3.6.1.2.1.1.2.0 (sysObjectID), sysDescr — 1.3.6.1.2.1.1.1.0
snmp_switch_models:
  - id: huawei_cloud_engine_s6330
    enabled: true
    match_sysobjectid: ".1.3.6.1.4.1.2011.2.23.666"
  - id: huawei_cloud_engine_s6750h
    enabled: true
    match_sysobjectid: ".1.3.6.1.4.1.2011.2.23.1247"
  - id: cisco_catalyst_4500
    enabled: true
    match_sysobjectid: ".1.3.6.1.4.1.9.1.917"
  - id: juniper_mx_204
    enabled: true
    match_sysobjectid: ".1.3.6.1.4.1.2636.1.1.1.2.144"
  - id: dlink_des_1218_me
    enabled: true
    match_sysobjectid: ".1.3.6.1.4.1.171.10.116.2"
  - id: juniper_qfx5110
    enabled: true
    match_sysobjectid: ".1.3.6.1.4.1.2636.1.1.1.4.82.17"
  - id: snr
    enabled: true
    match_sysdescr: "(?i)2990G|S2965-8T"
  - id: snr_qbridge
    enabled: true
    match_sysdescr: "(?i)S2940-8G"
  - id: extreme_xseries
    enabled: true
    match_sysdescr: "(?i)X670|X690|X460"
  - id: hpe_5900
    enabled: true
    match_sysdescr: "(?i)\\b(?:HPE|HP)\\s*5900\\b"
# Шаблоны БД: из шаблона используется charset (DSN MySQL в internal/config DBURL);
# хост/пользователь/имя БД — в companies/*.yaml → database
database_templates:
  mysql_default:
    charset: "utf8mb4"
